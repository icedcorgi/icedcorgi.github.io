<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardiner Keyboard</title>
    <style>
        @font-face {
            font-family: 'GardinerFont';
            src: url('eot(1).ttf') format('truetype');
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        #display {
            width: 90%;
            max-width: 600px;
            height: 120px;
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 15px;
            font-size: 2.5rem;
            font-family: 'GardinerFont', serif;
            word-wrap: break-word;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 90%;
            max-width: 600px;
        }

        .key {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 20px 10px;
            font-size: 1.8rem;
            font-family: 'GardinerFont', serif;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .key:active {
            transform: scale(0.95);
            background: #0056b3;
        }

        .key span.label {
            font-size: 0.7rem;
            font-family: sans-serif;
            margin-top: 5px;
            opacity: 0.8;
        }

        .controls {
            margin-top: 20px;
        }

        .btn-clear {
            padding: 10px 25px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="display"></div>

    <div class="keyboard">
        <button class="key" onclick="add('&#x1302D;')">&#x1302D;<span class="label">A28</span></button>
        <button class="key" onclick="add('&#x1339B;')">&#x1339B;<span class="label">V13</span></button>
        <button class="key" onclick="add('&#x130AD;')">&#x130AD;<span class="label">D36</span></button>
        <button class="key" onclick="add('&#x13220;')">&#x13220;<span class="label">N32</span></button>
        <button class="key" onclick="add('&#x132F2;')">&#x132F2;<span class="label">S29</span></button>
        <button class="key" onclick="add('&#x13216;')">&#x13216;<span class="label">N17</span></button>
        <button class="key" onclick="add('&#x131B3;')">&#x131B3;<span class="label">M22</span></button>
        <button class="key" onclick="add('&#x133A8;')">&#x133A8;<span class="label">V24</span></button>
        <button class="key" onclick="add('&#x133A3;')">&#x133A3;<span class="label">V20</span></button>
        <button class="key" onclick="add('&#x132E2;')">&#x132E2;<span class="label">S21</span></button>
        <button class="key" onclick="add('&#x133E4;')">&#x133E4;<span class="label">Z4</span></button>
        <button class="key" onclick="add('&#x13093;')">&#x13093;<span class="label">D21</span></button>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <script>
        const display = document.getElementById('display');

        function add(char) {
            display.innerHTML += char;
        }

        function clearAll() {
            display.innerHTML = '';
        }
    </script>
</body>
</html>
